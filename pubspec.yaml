name: liquidglass_music_player
description: "AURA — Dynamic Music Player & Audio Visualizer with Liquid Glass UI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Audio
  on_audio_query: ^2.9.0
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  just_audio_background: ^0.0.1-beta.17

  # Audio Visualization
  fft: ^0.5.1

  # Storage & Persistence
  shared_preferences: ^2.5.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.6

  # UI & Navigation
  go_router: ^17.3.0
  flutter_animate: ^4.5.2
  glassmorphism: ^3.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  palette_generator: ^0.3.3+7

  # Permissions
  permission_handler: ^12.0.3

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.3
  dio: ^5.9.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Icons & Assets
  google_fonts: ^8.1.0
  cupertino_icons: ^1.0.8
  share_plus: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
